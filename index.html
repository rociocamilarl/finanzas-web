<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Controller Financiero — Rocío</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <span style="font-size:22px">💰</span>
      <h1>Controller Financiero</h1>
      <span class="mes-label" id="header-mes"></span>
    </header>

    <main id="main-content">
      <!-- Renderizado por JS -->
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-view="dashboard">
        <span class="nav-icon">📊</span>
        <span>Resumen</span>
      </button>
      <button class="nav-btn" data-view="registro">
        <span class="nav-icon">➕</span>
        <span>Registrar</span>
      </button>
      <button class="nav-btn" data-view="flujo">
        <span class="nav-icon">📋</span>
        <span>Flujo</span>
      </button>
      <button class="nav-btn" data-view="deudas">
        <span class="nav-icon">🏦</span>
        <span>Deudas</span>
      </button>
      <button class="nav-btn" data-view="metas">
        <span class="nav-icon">🎯</span>
        <span>Metas</span>
      </button>
      <button class="nav-btn" data-view="config">
        <span class="nav-icon">⚙️</span>
        <span>Config</span>
      </button>
    </nav>
  </div>

  <div id="toast"></div>

  <script src="js/seed.js"></script>
  <script src="js/store.js"></script>
  <script src="js/calc.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Muestra mes actual en el header
    document.getElementById('header-mes').textContent =
      new Date().toLocaleDateString('es-CL', { month: 'short', year: 'numeric' });
  </script>
</body>
</html>
