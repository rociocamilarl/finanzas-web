<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Controller Financiero — Rocío</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    #login-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(150deg, #1e3a8a 0%, #2563eb 100%);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; padding: 24px; box-sizing: border-box;
    }
    #login-screen.hidden { display: none !important; }
    #login-card {
      background: #fff; border-radius: 20px; padding: 40px 28px;
      width: 100%; max-width: 340px; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    #login-card .login-icon { font-size: 48px; margin-bottom: 12px; }
    #login-card h2 { font-size: 22px; font-weight: 700; color: #1e293b; margin-bottom: 6px; }
    #login-card .login-sub { font-size: 14px; color: #64748b; margin-bottom: 24px; }
    #login-pass { width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 15px; box-sizing: border-box; margin-bottom: 12px; outline: none; }
    #login-pass:focus { border-color: #2563eb; }
    #login-btn { width: 100%; padding: 13px; background: #2563eb; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
    #login-btn:hover { background: #1d4ed8; }
    #login-error { color: #dc2626; font-size: 13px; margin-top: 10px; min-height: 18px; }
  </style>
</head>
<body>
  <div id="app">
    <header class="header">
      <span style="font-size:22px">💰</span>
      <h1>Controller Financiero</h1>
      <span class="mes-label" id="header-mes"></span>
    </header>

    <main id="main-content">
      <!-- Renderizado por JS -->
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-view="dashboard">
        <span class="nav-icon">📊</span>
        <span>Resumen</span>
      </button>
      <button class="nav-btn" data-view="registro">
        <span class="nav-icon">➕</span>
        <span>Registrar</span>
      </button>
      <button class="nav-btn" data-view="flujo">
        <span class="nav-icon">📋</span>
        <span>Flujo</span>
      </button>
      <button class="nav-btn" data-view="deudas">
        <span class="nav-icon">🏦</span>
        <span>Deudas</span>
      </button>
      <button class="nav-btn" data-view="metas">
        <span class="nav-icon">🎯</span>
        <span>Metas</span>
      </button>
      <button class="nav-btn" data-view="config">
        <span class="nav-icon">⚙️</span>
        <span>Config</span>
      </button>
    </nav>
  </div>

  <!-- Pantalla de login -->
  <div id="login-screen">
    <div id="login-card">
      <div class="login-icon">💰</div>
      <h2>Controller Financiero</h2>
      <p class="login-sub">Ingresa tu contraseña para continuar</p>
      <input id="login-pass" type="password" placeholder="Contraseña"
        onkeydown="if(event.key==='Enter') Auth.login()">
      <button id="login-btn" onclick="Auth.login()">Entrar</button>
      <div id="login-error"></div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="js/seed.js"></script>
  <script src="js/store.js"></script>
  <script src="js/calc.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>

  <script>
    document.getElementById('header-mes').textContent =
      new Date().toLocaleDateString('es-CL', { month: 'short', year: 'numeric' });

    document.addEventListener('DOMContentLoaded', () => Auth.init());
  </script>
</body>
</html>
