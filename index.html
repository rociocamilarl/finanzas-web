<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Controller Financiero — Rocío</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* Login crítico — inline para garantizar carga antes del paint */
    #login-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; height: 100%;
      background: linear-gradient(150deg, #1e3a8a 0%, #2563eb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 24px;
      box-sizing: border-box;
    }
    #login-screen.hidden { display: none !important; }
    #login-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 28px;
      width: 100%;
      max-width: 340px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .login-icon { font-size: 48px; margin-bottom: 12px; }
    #login-card h2 { font-size: 22px; font-weight: 700; color: #1e293b; margin-bottom: 6px; }
    #login-card .login-sub { font-size: 14px; color: #64748b; margin-bottom: 28px; }
    .oauth-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 13px 16px;
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      background: #fff; font-size: 15px; font-weight: 600; color: #1e293b;
      cursor: pointer; margin-bottom: 12px; transition: background .15s;
    }
    .oauth-btn:hover:not(:disabled) { background: #f8fafc; }
    .oauth-btn:disabled { opacity: .6; cursor: not-allowed; }
    .oauth-btn svg { flex-shrink: 0; }
    .oauth-divider { display:flex; align-items:center; gap:8px; margin: 4px 0 16px; color:#94a3b8; font-size:12px; }
    .oauth-divider::before,.oauth-divider::after { content:''; flex:1; height:1px; background:#e2e8f0; }
  </style>
</head>
<body>
  <div id="app">
    <header class="header">
      <span style="font-size:22px">💰</span>
      <h1>Controller Financiero</h1>
      <span class="mes-label" id="header-mes"></span>
    </header>

    <main id="main-content">
      <!-- Renderizado por JS -->
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-view="dashboard">
        <span class="nav-icon">📊</span>
        <span>Resumen</span>
      </button>
      <button class="nav-btn" data-view="registro">
        <span class="nav-icon">➕</span>
        <span>Registrar</span>
      </button>
      <button class="nav-btn" data-view="flujo">
        <span class="nav-icon">📋</span>
        <span>Flujo</span>
      </button>
      <button class="nav-btn" data-view="deudas">
        <span class="nav-icon">🏦</span>
        <span>Deudas</span>
      </button>
      <button class="nav-btn" data-view="metas">
        <span class="nav-icon">🎯</span>
        <span>Metas</span>
      </button>
      <button class="nav-btn" data-view="config">
        <span class="nav-icon">⚙️</span>
        <span>Config</span>
      </button>
    </nav>
  </div>

  <!-- Pantalla de login -->
  <div id="login-screen">
    <div id="login-card">
      <div class="login-icon">💰</div>
      <h2>Controller Financiero</h2>
      <p class="login-sub">Inicia sesión para continuar.<br>Tus datos se sincronizan automáticamente.</p>

      <button id="btn-google" class="oauth-btn" onclick="Auth.loginGoogle()">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        <span class="btn-label">Entrar con Google</span>
      </button>

      <div class="oauth-divider">o</div>

      <button id="btn-microsoft" class="oauth-btn" onclick="Auth.loginMicrosoft()">
        <svg width="20" height="20" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>
        <span class="btn-label">Entrar con Microsoft</span>
      </button>

      <p style="margin-top:24px;font-size:11px;color:#94a3b8">Elaborado por rocio.rojas@dataconsultingrrl.com</p>
    </div>
  </div>

  <div id="toast"></div>

  <script src="js/seed.js"></script>
  <script src="js/store.js"></script>
  <script src="js/cloud.js"></script>
  <script src="js/calc.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>

  <script>
    document.getElementById('header-mes').textContent =
      new Date().toLocaleDateString('es-CL', { month: 'short', year: 'numeric' });

    document.addEventListener('DOMContentLoaded', () => Auth.init());
  </script>
</body>
</html>
